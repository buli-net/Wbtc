plugins {
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.0.13'
    id 'com.gluonhq.gluonfx-gradle-plugin' version '1.0.28'
}

repositories {
    mavenCentral()
    google()
}

dependencies {
    implementation 'org.bitcoinj:bitcoinj-core:0.17.1'
    implementation 'de.jensd:fontawesomefx:8.0.13'
    implementation 'com.google.zxing:core:3.5.3'
}

javafx {
    version = "21-ea+11.3"
    modules = [ 'javafx.controls', 'javafx.fxml', 'javafx.graphics', 'javafx.base' ]
}

application {
    mainClass = 'wallettemplate.Main'
}

gluonfx {
    target = 'android'
}
