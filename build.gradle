plugins {
    id 'java'
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
    id 'com.gluonhq.gluonfx-gradle-plugin' version '1.0.22'
}

repositories {
    mavenCentral()
    maven { url 'https://nexus.gluonhq.com/nexus/content/repositories/releases' }
}

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

javafx {
    version = '21.0.4'
    modules = [ 'javafx.controls', 'javafx.fxml' ]
}

application {
    mainClass = 'wallettemplate.Main'
}

dependencies {
    implementation 'org.bitcoinj:bitcoinj-core:0.17.1'
    implementation 'de.jensd:fontawesomefx:8.0.13'
    implementation 'com.google.zxing:core:3.5.3'
    implementation 'org.slf4j:slf4j-jdk14:2.0.16'
    implementation 'jakarta.annotation:jakarta.annotation-api:3.0.0'

    testImplementation "org.junit.jupiter:junit-jupiter-api:5.11.4"
    testRuntimeOnly "org.junit.jupiter:junit-jupiter-engine:5.11.4"
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.compilerArgs.addAll(['--release', '17'])
}

tasks.withType(Javadoc).configureEach {
    options.encoding = 'UTF-8'
}

test {
    useJUnitPlatform()
}

gluonfx {
    target = 'android'
    graalvmHome = System.getenv("GRAALVM_HOME")
    attachConfig {
        version = '4.0.17'
        services 'display', 'lifecycle', 'statusbar', 'storage'
    }
    reflectionList = [
        'org.bitcoinj.wallet.Wallet',
        'org.bitcoinj.core.Transaction',
        'org.bitcoinj.params.MainNetParams',
        'wallettemplate.Main',
        'wallettemplate.MainController'
    ]
}
