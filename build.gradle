plugins {
    id 'java'
    id 'application'
    id 'com.gluonhq.gluonfx-gradle-plugin' version '1.0.22'
}

repositories {
    mavenCentral()
    google()
}

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

application {
    mainClass = 'wallettemplate.Main'
}

dependencies {
    // JavaFX thay cho javafxplugin
    implementation 'org.openjfx:javafx-base:21.0.4'
    implementation 'org.openjfx:javafx-graphics:21.0.4'
    implementation 'org.openjfx:javafx-controls:21.0.4'
    implementation 'org.openjfx:javafx-fxml:21.0.4'

    implementation 'org.bitcoinj:bitcoinj-core:0.17.1'
    implementation 'de.jensd:fontawesomefx:8.0.13'
    implementation 'com.google.zxing:core:3.5.3'
    implementation 'org.slf4j:slf4j-jdk14:2.0.16'
    implementation 'jakarta.annotation:jakarta.annotation-api:3.0.0'
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

gluonfx {
    target = 'android'
    attachConfig {
        services 'display', 'lifecycle', 'statusbar', 'storage'
    }
}
