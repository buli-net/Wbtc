plugins {
    id 'java'
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
    id 'com.gluonhq.gluonfx-gradle-plugin' version '1.0.28'
}

repositories {
    mavenCentral()
    google()
}

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

application {
    mainClass = 'wallettemplate.Main'
}

javafx {
    version = '17.0.10'
    modules = ['javafx.base', 'javafx.graphics', 'javafx.controls', 'javafx.fxml']
}

dependencies {
    implementation 'org.bitcoinj:bitcoinj-core:0.17.1'
    implementation 'de.jensd:fontawesomefx:8.0.13'
    implementation 'com.google.zxing:core:3.5.3'
    implementation 'org.slf4j:slf4j-jdk14:2.0.16'
    implementation 'jakarta.annotation:jakarta.annotation-api:3.0.0'
}

gluonfx {
    mainClassName = 'wallettemplate.Main'
    target = 'android'
    attachConfig {
        version = '4.0.17'
        services 'display', 'lifecycle', 'statusbar', 'storage'
    }
}
