plugins {
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.0.13'
    id 'com.gluonhq.gluonfx-gradle-plugin' version '1.0.28'
}

repositories {
    mavenCentral()
    google()
}

dependencies {
    implementation 'org.bitcoinj:bitcoinj-core:0.17.1'
    implementation 'de.jensd:fontawesomefx:8.0.13'
    implementation 'com.google.zxing:core:3.5.3'
    implementation 'org.bouncycastle:bcprov-jdk15to18:1.83'
    implementation 'com.google.guava:guava:33.4.0-android'
    implementation 'org.slf4j:slf4j-api:2.0.16'
    implementation 'jakarta.annotation:jakarta.annotation-api:2.1.1'
}

javafx {
    version = "17.0.7"
    modules = [ 'javafx.controls', 'javafx.fxml', 'javafx.graphics', 'javafx.base' ]
}

application {
    mainClass = 'wallettemplate.Main'
}

gluonfx {
    target = "android"
    attachConfig {
        version = "4.0.17"
        services "display", "lifecycle", "statusbar", "storage", "util"
    }
}
