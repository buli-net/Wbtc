apply plugin: 'com.android.application'
android {
    namespace 'com.wbtc.wallet'
    compileSdk 34
    compileOptions { sourceCompatibility 1.8; targetCompatibility 1.8 }
    defaultConfig {
        applicationId 'com.wbtc.wallet'
        minSdkVersion 21
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
    }
    dependencies {
        implementation 'androidx.activity:activity:1.8.2'
        implementation 'androidx.core:core:1.12.0'
        api fileTree(dir: '../libs', include: '*.aar')
        api fileTree(dir: '../libs', include: '*.jar')
    }
}
afterEvaluate {
    tasks.matching { it.name.contains("process") && it.name.contains("MainManifest") }.configureEach {
        doFirst {
            def mf = file('src/main/AndroidManifest.xml')
            if (mf.exists()) {
                def txt = mf.text
                def stripped = txt.replaceAll(/package="[^"]*"/, '')
                if (txt != stripped) { mf.text = stripped; println ">>> Stripped package" }
            }
        }
    }
}
