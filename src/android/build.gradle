apply plugin: 'com.android.application'
import org.gradle.api.JavaVersion

android {
    namespace 'com.wbtc.wallet'
    compileSdk 36
    buildToolsVersion "36.0.0"
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
    defaultConfig {
        applicationId 'com.wbtc.wallet'
        minSdkVersion 21
        targetSdkVersion 36
        versionCode 1
        versionName "1.0"
    }
    dependencies {
        implementation 'androidx.activity:activity:1.9.2'
        implementation 'androidx.core:core:1.13.1'
        api fileTree(dir: '../libs', include: '*.aar')
        api fileTree(dir: '../libs', include: '*.jar')
    }
    packaging { jniLibs { useLegacyPackaging = true } }
}
configurations.all {
    resolutionStrategy {
        force 'androidx.core:core:1.13.1'
        force 'androidx.activity:activity:1.9.2'
        force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
    }
    exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
    exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
}
tasks.withType(JavaCompile).configureEach {
    sourceCompatibility = JavaVersion.VERSION_11
    targetCompatibility = JavaVersion.VERSION_11
}
afterEvaluate {
    tasks.matching { it.name == "preBuild" || it.name == "preDebugBuild" }.configureEach {
        doFirst {
            fileTree(dir: 'src', include: '**/MainActivity.java').each { f ->
                if (f.text.contains('enableEdgeToEdge')) {
                    f.text = f.text.replace('WindowCompat.enableEdgeToEdge(getWindow());',
                                            'WindowCompat.setDecorFitsSystemWindows(getWindow(), false);')
                }
            }
        }
    }
}
