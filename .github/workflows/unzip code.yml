name: Unzip src

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Unzip wallettemplate.zip
        run: |
          cd 
          unzip -o wallettemplate.zip -d wallettemplate
          rm wallettemplate.zip

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Unzip wallettemplate.zip" || echo "No changes"
          git push
