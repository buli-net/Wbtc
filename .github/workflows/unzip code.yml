name: Auto Unzip Wbtc

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip wallettemplate.zip
        run: |
          ls -la
          if [ -f "wallettemplate.zip" ]; then
            unzip -o wallettemplate.zip -d.
            rm wallettemplate.zip
            echo "Unzipped wallettemplate.zip"
          fi
          # bung tất cả zip khác nếu có
          for z in *.zip; do
            [ -e "$z" ] || continue
            unzip -o "$z" -d.
            rm "$z"
          done
          ls -la

      - name: Commit extracted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Auto unzip wallettemplate.zip"
          git push