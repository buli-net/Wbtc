name: Build Wbtc APK
on: { workflow_dispatch: {} }
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: gluonhq/setup-graalvm@master
        env: { GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} }
        with: { graalvm: '22.1.0.1-Final', jdk: 'java17' }

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v3
        with: { gradle-version: '8.0' }

      - name: Build APK
        env:
          JAVA_TOOL_OPTIONS: "-XX:-UseContainerSupport"
          ANDROID_SDK_ROOT: ""
          ANDROID_HOME: ""
          ANDROID_SDK_HOME: ""
        run: |
          rm -rf ~/.gradle/daemon || true
          gradle wrapper --gradle-version 8.0
          chmod +x gradlew
          ./gradlew nativeBuild -Ptarget=android --no-daemon --stacktrace
          ./gradlew nativePackage -Ptarget=android --no-daemon --info --stacktrace

      - name: Show package log
        if: always()
        run: |
          echo "=== FIND LOGS ==="
          find build -type f -name "*.log" | head -20
          echo "=== PROCESS PACKAGE LOG ==="
          cat build/gluonfx/log/*.log 2>/dev/null | tail -n 800 || echo "no log in build/gluonfx/log"
          echo "=== GVM LOG ==="
          cat build/gluonfx/aarch64-android/gvm/log/*.log 2>/dev/null | tail -n 800 || echo "no log in gvm/log"

      - name: Find APK
        if: always()
        run: |
          find . -type f -name "*.apk" | head -20
          ls -lh build/gluonfx/aarch64-android/gvm/build/intermediates/apk/debug/*.apk 2>/dev/null || true
          ls -lh build/gluonfx/aarch64-android/gvm/android_project/app/build/outputs/apk/debug/*.apk 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Wbtc-apk
          path: "**/*.apk"
