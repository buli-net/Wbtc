name: Build Wbtc APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - name: Setup GraalVM 17
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '17'
          distribution: 'graalvm'
          components: 'native-image'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build APK with GluonFX
        run: |
          chmod +x gradlew || gradle wrapper --gradle-version 8.5
          ./gradlew gluonfxBuild --info -Ptarget=android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Wbtc-debug-apk
          path: |
            build/gluonfx/aarch64-android/gvm/*.apk
            build/gluonfx/arm64-android/gvm/*.apk
