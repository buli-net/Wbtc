name: Build Wbtc APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Setup GraalVM built by Gluon
        uses: gluonhq/setup-graalvm@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          graalvm: '22.1.0.1-Final'
          jdk: 'java17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 36
        run: |
          sdkmanager --install "platforms;android-36" "build-tools;36.0.0" "platform-tools" "ndk;25.1.8937393" || true
          yes | sdkmanager --licenses || true

      - name: Setup Gradle 8.0
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Build APK
        env:
          JAVA_TOOL_OPTIONS: "-XX:-UseContainerSupport"
        run: |
          gradle wrapper --gradle-version 8.0
          chmod +x gradlew
          ./gradlew nativeBuild -Ptarget=android --stacktrace
          ./gradlew nativePackage -Ptarget=android --info

      - name: DUMP PACKAGE LOGS
        if: always()
        run: |
          echo "=== FIND LOGS ==="
          find build -type f | grep -i log | head -30
          echo "=== process-package-task.log ==="
          cat build/gluonfx/log/*package* 2>/dev/null || echo "not found in log/"
          cat build/gluonfx/aarch64-android/gvm/log/*.log 2>/dev/null || true
          echo "=== gensrc android build.gradle ==="
          cat build/gluonfx/aarch64-android/gensrc/android/build.gradle 2>/dev/null || true
          echo "=== gensrc android gradle wrapper ==="
          cat build/gluonfx/aarch64-android/gensrc/android/gradle/wrapper/gradle-wrapper.properties 2>/dev/null || true

      - name: Upload APK if exists
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Wbtc-apk
          path: |
            build/gluonfx/**/gvm/*.apk
            build/**/*.apk
