name: Build Wbtc APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Setup GraalVM built by Gluon
        uses: gluonhq/setup-graalvm@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          graalvm: '22.1.0.1-Final'
          jdk: 'java17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle 8.0
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Build APK
        env:
          JAVA_TOOL_OPTIONS: "-XX:-UseContainerSupport"
        run: |
          # Fix AGP 8.13 error: ANDROID_HOME vs ANDROID_SDK_ROOT conflict
          unset ANDROID_SDK_ROOT
          unset ANDROID_HOME
          echo "ANDROID vars cleaned, Gluon will use ~/.gluon/substrate/Android"

          gradle wrapper --gradle-version 8.0
          chmod +x gradlew
          ./gradlew nativeBuild -Ptarget=android --stacktrace
          ./gradlew nativePackage -Ptarget=android --info --stacktrace

      - name: DUMP LOGS
        if: always()
        run: |
          echo "=== package task log ==="
          cat build/gluonfx/log/*package* 2>/dev/null | tail -n 300 || true
          echo "=== gvm inner gradle log ==="
          cat build/gluonfx/aarch64-android/gvm/log/*.log 2>/dev/null | tail -n 200 || true
          echo "=== apk output ==="
          find build -name "*.apk" -ls 2>/dev/null || echo "no apk yet"

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Wbtc-apk
          path: |
            build/gluonfx/**/gvm/**/*.apk
            build/gluonfx/**/gvm/android_project/app/build/outputs/apk/**/*.apk
            build/**/*.apk
