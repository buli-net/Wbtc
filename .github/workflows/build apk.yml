name: Build Wbtc APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: gluonhq/setup-graalvm@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          graalvm: '22.1.0.1-Final'
          jdk: 'java17'

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: Build APK
        env:
          JAVA_TOOL_OPTIONS: "-XX:-UseContainerSupport"
          ANDROID_SDK_ROOT: ""
          ANDROID_HOME: ""
          ANDROID_SDK_HOME: ""
        run: |
          rm -rf ~/.gradle/daemon || true
          gradle wrapper --gradle-version 8.0
          chmod +x gradlew
          ./gradlew nativeBuild -Ptarget=android --no-daemon --stacktrace
          ./gradlew nativePackage -Ptarget=android --no-daemon --info --stacktrace

      - name: Show package log
        if: always()
        run: |
          find build -type f -name "*.log" | head -20
          cat build/gluonfx/log/*.log 2>/dev/null | tail -n 800 || true
          cat build/gluonfx/aarch64-android/gvm/log/*.log 2>/dev/null | tail -n 800 || true

      - name: Find APK
        if: always()
        run: find . -type f -name "*.apk" -ls 2>/dev/null || echo "no apk"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Wbtc-apk
          path: "**/*.apk"
