name: Android Gluon Build
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup GraalVM for JDK 17
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '17'
          distribution: 'graalvm'
          components: 'native-image'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle 8.13
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.13

      - name: Build Android APK
        run: |
          java -version
          native-image --version
          chmod +x gradlew
          ./gradlew clean gluonfxBuild gluonfxPackage -Ptarget=android --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wbtc-apk
          path: build/gluonfx/aarch64-android/gvm/android_project/app/build/outputs/apk/debug/app-debug.apk
