name: Android
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: graalvm/setup-graalvm@v1
        with:
          version: '22.1.0'
          java-version: '17'
          distribution: 'gluon'
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.13
      - run: chmod +x gradlew && ./gradlew clean gluonfxBuild gluonfxPackage -Ptarget=android --no-daemon
      - run: find build -name "*.apk" | head
      - uses: actions/upload-artifact@v4
        with:
          name: wbtc-apk
          path: build/gluonfx/aarch64-android/gvm/android_project/app/build/outputs/apk/debug/app-debug.apk
